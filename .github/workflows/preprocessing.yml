name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'heart_raw/**'
      - 'preprocessing/automate_*.py'
  workflow_dispatch: # Mengizinkan untuk dijalankan secara manual

jobs:
  build-and-preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run Preprocessing
        # Pastikan nama file di bawah ini sesuai dengan nama file python milikmu yang sudah di-rename
        run: |
          python preprocessing/automate_MUH_AKSA.py

      - name: Commit and Push Preprocessed Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add heart_preprocessing/
          git commit -m "Auto-generate preprocessed data [skip ci]" || echo "No changes to commit"
          git push